<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: 'Courier New', monospace;
      font-size: 56px;
      font-weight: 700;
      fill: #58a6ff;
      letter-spacing: 4px;
    }

    .sub {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      fill: #8b949e;
      letter-spacing: 2px;
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }

    .cursor {
      animation: blink 1s step-end infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>

  <rect width="100%" height="100%" fill="#0d1117" rx="16"/>

  <g class="float">
    <text x="50%" y="95" text-anchor="middle" class="text">
      HERA CHEN
      <tspan class="cursor">_</tspan>
    </text>

    <text x="50%" y="140" text-anchor="middle" class="sub">
      Software Engineer
    </text>
  </g>
</svg>