<svg width="220" height="80" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="reveal-clip">
      <rect x="0" y="0" width="0" height="80">
        <animate attributeName="width" from="0" to="220" dur="1.8s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <rect width="220" height="80" fill="#4274D9" rx="8" />

  <text
    x="50%"
    y="50%"
    font-size="42"
    font-family="monospace"
    font-weight="700"
    fill="#95CCDD"
    dominant-baseline="central"
    text-anchor="middle"
    clip-path="url(#reveal-clip)"
  >
    Hello!
  </text>
</svg>
